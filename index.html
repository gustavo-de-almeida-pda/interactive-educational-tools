<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Educational Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .subtitle { color: #94a3b8; margin-bottom: 2.5rem; }
    .tools { display: grid; gap: 1.5rem; width: 100%; max-width: 600px; }
    .tool-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; text-decoration: none; color: inherit; transition: border-color 0.2s, transform 0.2s; }
    .tool-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
    .tool-card h2 { font-size: 1.25rem; margin-bottom: 0.5rem; color: #f8fafc; }
    .tool-card p { color: #94a3b8; font-size: 0.95rem; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>Interactive Educational Tools</h1>
  <p class="subtitle">A set of interactive tools for educational purposes in data analysis.</p>
  <div class="tools">
    <a href="./polynomial-regression-analysis/" class="tool-card">
      <h2>Polynomial Regression Analysis</h2>
      <p>Explore polynomial regression concepts interactively — underfitting, overfitting, regularization (L1/L2), and model evaluation with real-time charts.</p>
    </a>
  </div>
</body>
</html>
