name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'polynomial-regression-analysis/package-lock.json'

      - name: Install dependencies (polynomial-regression-analysis)
        working-directory: polynomial-regression-analysis
        run: npm ci --legacy-peer-deps

      - name: Build (polynomial-regression-analysis)
        working-directory: polynomial-regression-analysis
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Assemble site
        run: |
          mkdir -p _site/polynomial-regression-analysis
          cp index.html _site/
          cp polynomial-regression-analysis/dist/index.html _site/polynomial-regression-analysis/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
